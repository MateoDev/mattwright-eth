  <text x="375" y="410" text-anchor="middle" font-size="10" fill="#888" font-style="italic" font-family="Helvetica,Arial,sans-serif">Every connection is a transaction. Every resource is composable.</text>
  <text x="375" y="425" text-anchor="middle" font-size="10" fill="#888" font-style="italic" font-family="Helvetica,Arial,sans-serif">The agent selects optimal resources for each micro-task in real-time.</text>

