  <text x="152" y="195" text-anchor="middle" font-size="9" fill="#999" font-style="italic" font-family="Helvetica,Arial,sans-serif">Unsolved: bulk settlement,</text>
  <text x="152" y="210" text-anchor="middle" font-size="9" fill="#999" font-style="italic" font-family="Helvetica,Arial,sans-serif">payment channels,</text>
  <text x="152" y="225" text-anchor="middle" font-size="9" fill="#999" font-style="italic" font-family="Helvetica,Arial,sans-serif">pre-funded sessions</text>
  <text x="152" y="252" text-anchor="middle" font-size="9" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">The starting point</text>
  <line x1="250" y1="170" x2="270" y2="170" stroke="#111" stroke-width="1.5"/>
  <polygon points="268,165 278,170 268,175" fill="#111"/>
