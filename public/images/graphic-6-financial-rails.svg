  <line x1="90" y1="110" x2="215" y2="110" stroke="#ddd" stroke-width="1"/>
  <text x="152" y="130" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">x402 protocol</text>
