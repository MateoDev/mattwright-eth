  <text x="372" y="145" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">Lending / Farming / Arbitrage</text>
  <text x="372" y="160" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">Agent credit + insurance</text>
  <line x1="310" y1="175" x2="435" y2="175" stroke="#eee" stroke-width="1"/>
  <text x="372" y="195" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">Perceive + Strategize</text>
  <text x="372" y="210" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">+ Execute + Evolve</text>
  <text x="372" y="225" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">= Self-driving money</text>
  <text x="372" y="252" text-anchor="middle" font-size="9" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">DeFi for agents, not humans</text>
  <line x1="470" y1="170" x2="490" y2="170" stroke="#111" stroke-width="1.5"/>
  <polygon points="488,165 498,170 488,175" fill="#111"/>
  <rect x="500" y="75" width="185" height="190" rx="6" stroke="#111" stroke-width="2" fill="none"/>
  <text x="592" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#111" font-family="Helvetica,Arial,sans-serif">TRADFI BRIDGE</text>
  <line x1="530" y1="110" x2="655" y2="110" stroke="#ddd" stroke-width="1"/>
  <text x="592" y="130" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">Intent decomposition</text>
  <text x="592" y="145" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">Risk management rails</text>
  <text x="592" y="160" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">Regulatory compliance</text>
  <line x1="530" y1="175" x2="655" y2="175" stroke="#eee" stroke-width="1"/>
  <text x="592" y="195" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">Blended portfolios:</text>
  <text x="592" y="210" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">on-chain yield +</text>
  <text x="592" y="225" text-anchor="middle" font-size="9" fill="#555" font-family="Helvetica,Arial,sans-serif">tokenized treasuries</text>
  <text x="592" y="252" text-anchor="middle" font-size="9" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">The intelligent middle layer</text>
  <text x="350" y="300" text-anchor="middle" font-size="10" fill="#888" font-style="italic" font-family="Helvetica,Arial,sans-serif">Agents access DeFi for composability. TradFi for depth. Intents bridge both.</text>
