<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700" height="340">
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#111" font-family="Helvetica,Arial,sans-serif">FINANCIAL RAILS: THREE LAYERS</text>
  <text x="350" y="46" text-anchor="middle" font-size="10" fill="#888" font-family="Helvetica,Arial,sans-serif">Your agent will have a wallet before a bank account</text>
  <rect x="60" y="75" width="185" height="190" rx="6" stroke="#111" stroke-width="2" fill="none"/>
