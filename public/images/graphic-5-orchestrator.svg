<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#111" font-family="Helvetica,Arial,sans-serif">THE ORCHESTRATOR</text>
  <text x="350" y="46" text-anchor="middle" font-size="10" fill="#888" font-family="Helvetica,Arial,sans-serif">From operator to orchestrator: humans move up the stack</text>

  <!-- Human figure at center-top -->
  <circle cx="350" cy="105" r="20" stroke="#111" stroke-width="2" fill="none"/>
  <circle cx="350" cy="98" r="7" stroke="#111" stroke-width="1.5" fill="none"/>
  <line x1="350" y1="112" x2="350" y2="130" stroke="#111" stroke-width="1.5"/>
  <line x1="336" y1="120" x2="364" y2="120" stroke="#111" stroke-width="1.5"/>

  <text x="350" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#111" font-family="Helvetica,Arial,sans-serif">HUMAN</text>
  <text x="350" y="168" text-anchor="middle" font-size="9" fill="#666" font-family="Helvetica,Arial,sans-serif">Sets direction / Makes judgment calls / Defines boundaries</text>

  <!-- Radiating lines to agent roles -->
  <line x1="310" y1="175" x2="140" y2="240" stroke="#111" stroke-width="1.2"/>
  <line x1="330" y1="178" x2="260" y2="240" stroke="#111" stroke-width="1.2"/>
  <line x1="350" y1="180" x2="350" y2="240" stroke="#111" stroke-width="1.2"/>
  <line x1="370" y1="178" x2="440" y2="240" stroke="#111" stroke-width="1.2"/>
  <line x1="390" y1="175" x2="560" y2="240" stroke="#111" stroke-width="1.2"/>

  <!-- Agent circles with roles -->
  <circle cx="140" cy="260" r="22" stroke="#111" stroke-width="1.5" fill="none"/>
  <text x="140" y="264" text-anchor="middle" font-size="8" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">IDENTITY</text>
  <text x="140" y="300" text-anchor="middle" font-size="8" fill="#888" font-family="Helvetica,Arial,sans-serif">Who agents are</text>

  <circle cx="260" cy="260" r="22" stroke="#111" stroke-width="1.5" fill="none"/>
  <text x="260" y="257" text-anchor="middle" font-size="8" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">REPU-</text>
  <text x="260" y="268" text-anchor="middle" font-size="8" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">TATION</text>
  <text x="260" y="300" text-anchor="middle" font-size="8" fill="#888" font-family="Helvetica,Arial,sans-serif">Who to trust</text>

  <circle cx="350" cy="260" r="22" stroke="#111" stroke-width="1.5" fill="none"/>
  <text x="350" y="257" text-anchor="middle" font-size="8" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">GOVER-</text>
  <text x="350" y="268" text-anchor="middle" font-size="8" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">NANCE</text>
  <text x="350" y="300" text-anchor="middle" font-size="8" fill="#888" font-family="Helvetica,Arial,sans-serif">What they can do</text>

  <circle cx="440" cy="260" r="22" stroke="#111" stroke-width="1.5" fill="none"/>
  <text x="440" y="257" text-anchor="middle" font-size="8" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">FINAN-</text>
  <text x="440" y="268" text-anchor="middle" font-size="8" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">CIAL</text>
  <text x="440" y="300" text-anchor="middle" font-size="8" fill="#888" font-family="Helvetica,Arial,sans-serif">How value moves</text>

  <circle cx="560" cy="260" r="22" stroke="#111" stroke-width="1.5" fill="none"/>
  <text x="560" y="257" text-anchor="middle" font-size="8" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">OPEN</text>
  <text x="560" y="268" text-anchor="middle" font-size="8" font-weight="600" fill="#111" font-family="Helvetica,Arial,sans-serif">INFRA</text>
  <text x="560" y="300" text-anchor="middle" font-size="8" fill="#888" font-family="Helvetica,Arial,sans-serif">Where they run</text>

  <!-- Connecting arc between agent circles -->
  <path d="M 162 260 Q 200 310 238 260" stroke="#ddd" stroke-width="1" fill="none"/>
  <path d="M 282 260 Q 310 310 328 260" stroke="#ddd" stroke-width="1" fill="none"/>
  <path d="M 372 260 Q 405 310 418 260" stroke="#ddd" stroke-width="1" fill="none"/>
  <path d="M 462 260 Q 500 310 538 260" stroke="#ddd" stroke-width="1" fill="none"/>

  <!-- Bottom text -->
  <text x="350" y="345" text-anchor="middle" font-size="10" fill="#888" font-style="italic" font-family="Helvetica,Arial,sans-serif">Agency Rails are not just agent infrastructure.</text>
  <text x="350" y="360" text-anchor="middle" font-size="10" fill="#888" font-style="italic" font-family="Helvetica,Arial,sans-serif">They are your interface to the agent economy.</text>
  <text x="350" y="385" text-anchor="middle" font-size="10" fill="#555" font-weight="600" font-family="Helvetica,Arial,sans-serif">The human moves from operator to orchestrator.</text>
</svg>