<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; }
    .era-label { font-size: 13px; font-weight: 600; letter-spacing: 1.5px; fill: #111; }
    .era-desc { font-size: 11px; fill: #555; }
    .era-verb { font-size: 15px; font-weight: 700; fill: #111; }
    .note { font-size: 10px; fill: #888; font-style: italic; }
  </style>

  <!-- Web1 -->
  <circle cx="100" cy="130" r="50" stroke="#111" stroke-width="2" fill="none"/>
  <ellipse cx="100" cy="125" rx="18" ry="11" stroke="#111" stroke-width="1.5" fill="none"/>
  <circle cx="100" cy="125" r="5" stroke="#111" stroke-width="1.5" fill="none"/>
  <circle cx="100" cy="125" r="2" fill="#111"/>
  <text x="100" y="200" text-anchor="middle" class="era-label">WEB 1.0</text>
  <text x="100" y="218" text-anchor="middle" class="era-verb">Read</text>
  <text x="100" y="238" text-anchor="middle" class="era-desc">Static pages</text>
  <text x="100" y="253" text-anchor="middle" class="era-desc">Traditional banking</text>

  <!-- Arrow 1-2 -->
  <line x1="155" y1="130" x2="235" y2="130" stroke="#111" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="233,125 243,130 233,135" fill="#111"/>

  <!-- Web2 -->
  <circle cx="300" cy="130" r="50" stroke="#111" stroke-width="2" fill="none"/>
  <line x1="288" y1="138" x2="312" y2="114" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="308" y1="110" x2="316" y2="118" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="285" y1="141" x2="291" y2="135" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
  <text x="300" y="200" text-anchor="middle" class="era-label">WEB 2.0</text>
  <text x="300" y="218" text-anchor="middle" class="era-verb">Read + Write</text>
  <text x="300" y="238" text-anchor="middle" class="era-desc">Social platforms</text>
  <text x="300" y="253" text-anchor="middle" class="era-desc">Fintech</text>

  <!-- Arrow 2-3 -->
  <line x1="355" y1="130" x2="435" y2="130" stroke="#111" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="433,125 443,130 433,135" fill="#111"/>

  <!-- Web3 -->
  <circle cx="500" cy="130" r="50" stroke="#111" stroke-width="2" fill="none"/>
  <circle cx="493" cy="122" r="8" stroke="#111" stroke-width="1.8" fill="none"/>
  <line x1="500" y1="128" x2="515" y2="143" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="510" y1="138" x2="515" y2="133" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>
  <text x="500" y="200" text-anchor="middle" class="era-label">WEB 3.0</text>
  <text x="500" y="218" text-anchor="middle" class="era-verb">Read + Write + Own</text>
  <text x="500" y="238" text-anchor="middle" class="era-desc">Internet-native money</text>
  <text x="500" y="253" text-anchor="middle" class="era-desc">Programmable finance</text>

  <!-- Arrow 3-4 -->
  <line x1="555" y1="130" x2="635" y2="130" stroke="#111" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="633,125 643,130 633,135" fill="#111"/>

  <!-- Web4 emphasized -->
  <circle cx="710" cy="130" r="58" stroke="#111" stroke-width="3" fill="none"/>
  <polygon points="705,105 698,132 710,128 715,155 722,128 710,132" stroke="#111" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
  <text x="710" y="208" text-anchor="middle" class="era-label" font-size="14">WEB 4.0</text>
  <text x="710" y="228" text-anchor="middle" class="era-verb" font-size="16">Read + Write + Own + Act</text>
  <text x="710" y="250" text-anchor="middle" class="era-desc">Autonomous agents</text>
  <text x="710" y="265" text-anchor="middle" class="era-desc">The internet gains agency</text>

  <text x="450" y="305" text-anchor="middle" class="note">Each chapter built on the last. Web4 is where software acts autonomously.</text>
</svg>
